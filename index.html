<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Sports TV</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #e63946;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #6b6b80;
      --card: #16161f;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(230,57,70,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230,57,70,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* Header */
    header {
      padding: 40px 0 30px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.6rem;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Search */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    button.search-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 24px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button.search-btn:hover { background: #c1121f; }
    button.search-btn:active { transform: scale(0.97); }

    /* Quick tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 36px;
    }

    .tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Status */
    .status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status span {
      color: var(--accent);
    }

    /* Results grid */
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      cursor: pointer;
      animation: fadeIn 0.3s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .live-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .live-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 1.4s infinite;
      flex-shrink: 0;
    }

    .viewers {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .card-body {
      padding: 12px 14px;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 6px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }

    /* Loading */
    .loading {
      display: flex;
      justify-content: center;
      padding: 60px 0;
      gap: 8px;
    }

    .loading span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 0.8s ease-in-out infinite;
    }

    .loading span:nth-child(2) { animation-delay: 0.15s; }
    .loading span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-10px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="live-dot"></div>
      <h1>Live Sports TV</h1>
      <span class="tagline">OK.ru streams</span>
    </header>

    <div class="search-bar">
      <input type="text" id="query" placeholder="Search live streams... e.g. Premier League, Manchester United" />
      <button class="search-btn" onclick="doSearch()">SEARCH</button>
    </div>

    <div class="tags">
      <span class="tag" onclick="setQuery('прямой эфир футбол')">⚽ Football Live</span>
      <span class="tag" onclick="setQuery('premier league live')">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</span>
      <span class="tag" onclick="setQuery('manchester united live')">Manchester United</span>
      <span class="tag" onclick="setQuery('champions league live')">🏆 Champions League</span>
      <span class="tag" onclick="setQuery('NBA live')">🏀 NBA</span>
      <span class="tag" onclick="setQuery('formula 1 live')">🏎️ Formula 1</span>
      <span class="tag" onclick="setQuery('прямой эфир спорт')">📡 Прямой эфир</span>
    </div>

    <div class="status" id="status">Ready to search</div>
    <div id="results" class="results"></div>
  </div>

  <script>
    // Demo data simulating OK.ru video.search results
    const demoResults = [
      { title: "Premier League LIVE: Arsenal vs Chelsea", viewers: "12.4K", channel: "Sports Live HD", thumb: "https://picsum.photos/seed/s1/400/225" },
      { title: "Manchester United vs Liverpool — Full Match", viewers: "8.1K", channel: "Football Stream", thumb: "https://picsum.photos/seed/s2/400/225" },
      { title: "Champions League Live Stream 2024", viewers: "22K", channel: "UEFA Official", thumb: "https://picsum.photos/seed/s3/400/225" },
      { title: "NBA Live: Lakers vs Warriors", viewers: "5.6K", channel: "NBA Streams", thumb: "https://picsum.photos/seed/s4/400/225" },
      { title: "Formula 1 Grand Prix — Live Coverage", viewers: "9.3K", channel: "F1 Live", thumb: "https://picsum.photos/seed/s5/400/225" },
      { title: "Прямой эфир: Лига чемпионов", viewers: "31K", channel: "Спорт ТВ", thumb: "https://picsum.photos/seed/s6/400/225" },
    ];

    function setQuery(q) {
      document.getElementById('query').value = q;
      doSearch();
    }

    function doSearch() {
      const q = document.getElementById('query').value.trim();
      const resultsEl = document.getElementById('results');
      const statusEl = document.getElementById('status');

      if (!q) return;

      statusEl.innerHTML = 'Searching...';
      resultsEl.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';

      setTimeout(() => {
        const filtered = demoResults.filter(r =>
          r.title.toLowerCase().includes(q.toLowerCase()) ||
          r.channel.toLowerCase().includes(q.toLowerCase()) ||
          q.length > 3
        );

        statusEl.innerHTML = `Found <span>${filtered.length}</span> live streams for "${q}"`;

        if (filtered.length === 0) {
          resultsEl.innerHTML = `<div class="empty"><span class="empty-icon">📡</span>No live streams found for "${q}"</div>`;
          return;
        }

        resultsEl.innerHTML = filtered.map((v, i) => `
          <div class="card" style="animation-delay:${i * 0.06}s">
            <div class="thumb">
              <img src="${v.thumb}" alt="${v.title}" loading="lazy"/>
              <div class="live-badge">LIVE</div>
              <div class="viewers">👁 ${v.viewers}</div>
            </div>
            <div class="card-body">
              <div class="card-title">${v.title}</div>
              <div class="card-meta">${v.channel}</div>
            </div>
          </div>
        `).join('');
      }, 800);
    }

    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  </script>
</body>
</html>
